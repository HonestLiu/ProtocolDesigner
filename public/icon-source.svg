<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Node 1: Protocol layers (Message) -->
  <rect x="156" y="112" width="200" height="48" rx="12" fill="rgba(255,255,255,0.9)"/>
  <rect x="156" y="112" width="48" height="48" rx="12" fill="rgba(255,255,255,0.3)"/>
  <rect x="170" y="126" width="20" height="20" rx="4" fill="white"/>
  <line x1="210" y1="136" x2="340" y2="136" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round"/>
  <!-- Connector line from Message to Struct -->
  <line x1="256" y1="160" x2="256" y2="200" stroke="rgba(255,255,255,0.7)" stroke-width="6" stroke-linecap="round"/>
  <circle cx="256" cy="180" r="6" fill="#34d399"/>
  <!-- Node 2: Struct layer -->
  <rect x="156" y="200" width="200" height="48" rx="12" fill="rgba(255,255,255,0.85)"/>
  <rect x="156" y="200" width="48" height="48" rx="12" fill="rgba(255,255,255,0.25)"/>
  <rect x="172" y="216" width="16" height="16" rx="3" fill="white"/>
  <line x1="210" y1="224" x2="340" y2="224" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round"/>
  <!-- Connector line from Struct to Field -->
  <line x1="256" y1="248" x2="256" y2="288" stroke="rgba(255,255,255,0.7)" stroke-width="6" stroke-linecap="round"/>
  <circle cx="256" cy="268" r="6" fill="#0ea5e9"/>
  <!-- Node 3: Field layer -->
  <rect x="156" y="288" width="200" height="48" rx="12" fill="rgba(255,255,255,0.8)"/>
  <rect x="156" y="288" width="48" height="48" rx="12" fill="rgba(255,255,255,0.2)"/>
  <rect x="172" y="304" width="16" height="16" rx="3" fill="white"/>
  <line x1="210" y1="312" x2="340" y2="312" stroke="rgba(255,255,255,0.35)" stroke-width="2" stroke-linecap="round"/>
  <!-- Connector line from Field to Enum -->
  <line x1="256" y1="336" x2="256" y2="364" stroke="rgba(255,255,255,0.7)" stroke-width="6" stroke-linecap="round"/>
  <circle cx="256" cy="350" r="6" fill="#f59e0b"/>
  <!-- Node 4: Enum layer (smaller) -->
  <rect x="196" y="364" width="120" height="36" rx="10" fill="rgba(255,255,255,0.75)"/>
  <rect x="196" y="364" width="36" height="36" rx="10" fill="rgba(255,255,255,0.2)"/>
  <circle cx="214" cy="382" r="6" fill="white"/>
  <line x1="232" y1="382" x2="300" y2="382" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round"/>
</svg>
